<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  role="img"
  fill="none"
  width="846"
  height="188"
>
  <title>GitHub Top Languages</title>
  <foreignObject width="100%" height="100%">
    <div id="root" xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .main {
          --gap: 24px;
          --progress-size: 13px;
          padding: var(--gap);
          padding-bottom: 28px;
          border: 1px solid;
          border-radius: 6px;
          color: #e6edf3;
          border-color: #30363d;
          background-color: transparent;
          font-size: 13px;
          font-family:
            ui-monospace,
            SFMono-Regular,
            SF Mono,
            Menlo,
            Consolas,
            Liberation Mono,
            monospace;
        }

        .progress {
          width: 100%;
          height: var(--progress-size);
          border-radius: 2px;
          overflow: hidden;
          margin-bottom: 20px;
          display: flex;
        }

        .progress .item {
          height: 100%;
        }

        .languages {
          display: grid;
        }

        .languages .legend {
          display: flex;
          align-items: center;
          position: relative;
        }

        .legend .color {
          position: absolute;
          bottom: -9px;
          left: 0;
          width: 100%;
          height: 3px;
          display: inline-flex;
          background-image: linear-gradient(
            to right,
            #222,
            transparent var(--gradient),
            transparent
          );
        }
        .legend .color .core {
          display: inline-block;
          background-color: var(--color);
        }
        .legend .icon {
          width: 14px;
          height: 14px;
          margin-right: 0.5em;
          border-radius: 2px;
        }
        .legend .icon .placeholder {
          display: inline-block;
          width: 100%;
          height: 100%;
          background-color: var(--color);
        }
        .legend .name {
          margin-right: 0.3em;
          white-space: nowrap;
        }
        .legend .percentage {
          font-size: 90%;
          color: #767f89;
        }
      </style>

